<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SWARD</title>
    <script>
      // GitHub Pages SPA redirect: encode the full path into a query param
      // so index.html can restore it via history.replaceState
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '') + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
