
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>SWARD</title>
      <meta name="description" content="This web application offers tailored dashboards for students and teachers, providing interactive learning resources, academic tracking, and feedback tools to enhance educational outcomes." />
      <meta name="robots" content="noindex, nofollow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <script>
        // Restore path redirected from 404.html on GitHub Pages
        (function () {
          var p = new URLSearchParams(window.location.search).get('p');
          if (p) {
            window.history.replaceState(null, '', '/' + decodeURIComponent(p));
          }
        })();
      </script>
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
